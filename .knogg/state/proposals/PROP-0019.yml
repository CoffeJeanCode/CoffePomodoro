id: PROP-0019
status: applied
target: plans/master_plan.yml
reason: 'Stage PWA 1-3 roadmap: Convertir CoffePomodoro en PWA con aislamiento visual, soporte offline completo, y persistencia local del estado cognitivo'
created: 2026-05-24
patch:
  stages:
    PWA-1:
      dod:
      - npm run build genera un manifest.webmanifest valido con display standalone
      - 'Lighthouse audits: installable=yes'
      - Iconos 192+512 presentes en manifest
      - Prompt de instalacion aparece solo cuando el timer esta pausado o detenido
      - Meta tags (theme-color, apple-touch-icon, manifest link) presentes en index.html
      name: Aislamiento Visual y Manifiesto (Instalabilidad)
      objective: Configurar manifest.json y assets visuales para que la app sea instalable en escritorio/movil ejecutandose en modo standalone/fullscreen, eliminando la interfaz del navegador (barra de URL, pestanas) para crear un lienzo libre de distracciones.
      tasks:
        PWA-T1.1:
          assignee: opencode
          description: Agregar vite-plugin-pwa como devDependency y configurar VitePWA plugin en vite.config.ts con registerType=autoUpdate, workbox config basica, y manifest placeholder
          status: pending
          title: Instalar vite-plugin-pwa y configurar VitePluginPWAModule
        PWA-T1.2:
          assignee: opencode
          description: Definir Web App Manifest con name, short_name, description, start_url, display=standalone, theme_color, background_color, iconos 192x192 y 512x512 (maskable), categories=productivity
          status: pending
          title: Crear manifest.webmanifest con display standalone
        PWA-T1.3:
          assignee: opencode
          description: 'Crear iconos PWA a partir de favicon.svg existente: 192x192, 512x512 (maskable con padding), apple-touch-icon 180x180. Usar svg-to-png o herramienta similar en public/icons/'
          status: pending
          title: Generar iconos PWA (192, 512, maskable, favicon iOS)
        PWA-T1.4:
          assignee: opencode
          description: Agregar theme-color meta, apple-mobile-web-app-capable, apple-mobile-web-app-status-bar-style, link rel=manifest, link rel=apple-touch-icon en index.html head
          status: pending
          title: Agregar meta tags PWA en index.html
        PWA-T1.5:
          assignee: opencode
          description: 'Crear hook useInstallPrompt que capture beforeinstallprompt, guarde el deferredPrompt, y exponga canInstall + triggerInstall. Solo mostrar prompt cuando timer NO este corriendo (respetar foco activo). UI sutil: btn flotante o Mantine Badge'
          status: pending
          title: Implementar prompt de instalacion contextual (beforeinstallprompt)
    PWA-2:
      dod:
      - npm run build genera sw.js y workbox files automaticamente
      - App carga y funciona en modo avion (Chrome DevTools offline simulation)
      - Fuentes Playfair Display cargan sin conexion a internet
      - Alarmas .mp3/.aac reproducen correctamente offline
      - Lighthouse PWA score >= 90 en categoria offline
      - Update notification Mantine sutil aparece cuando hay nueva version
      name: El Refugio Offline (Service Worker y Caching)
      objective: Implementar y registrar un Service Worker para cache de recursos estaticos (HTML, CSS, JS, fuentes, sonidos de alarma). Garantizar carga instantanea y funcionamiento completo en modo avion/sin WiFi.
      tasks:
        PWA-T2.1:
          assignee: opencode
          description: Configurar VitePWA workbox con globPatterns para JS/CSS/HTML, navigateFallback, runtimeCaching para Google Fonts (cacheFirst con 30 dias), y precaching de assets de alarma
          status: pending
          title: Configurar Workbox en vite-plugin-pwa para precaching de app shell
        PWA-T2.2:
          assignee: opencode
          description: Descargar Playfair Display y mover a src/assets/fonts/. Eliminar dependencia de Google Fonts CDN en index.html. Agregar @font-face en CSS. Garantiza funcionamiento 100% offline sin CDN
          status: pending
          title: Migrar fuentes a bundle local (self-hosted)
        PWA-T2.3:
          assignee: opencode
          description: Configurar runtimeCaching para los archivos .mp3/.aac en src/assets/ con cacheFirst strategy. Los sonidos de alarma deben funcionar offline para notificar fin de sesion correctamente
          status: pending
          title: Estrategia de cache para assets de audio (alarmas)
        PWA-T2.4:
          assignee: opencode
          description: Importar y ejecutar registerSW() de virtual:pwa-register en main.tsx. Configurar onUpdate callback para notificar al usuario cuando hay nueva version disponible (Mantine Notification sutil, sin interrumpir sesion activa)
          status: pending
          title: Registrar Service Worker en main.tsx con autoUpdate
        PWA-T2.5:
          assignee: opencode
          description: Crear pagina offline.html en public/ que muestre un mensaje coherente con el branding de CoffePomodoro si algo falla. Configurar navigateFallback en workbox para usarla
          status: pending
          title: Agregar pagina offline fallback personalizada
    PWA-3:
      dod:
      - Migracion de stores a IndexedDB completada sin perdida de datos existentes
      - Sesiones de timer activas se restauran al reabrir la PWA con remainingTime recalculado
      - Brain Dump notes persisten correctamente tras cierre y reinicio de app/dispositivo
      - Auto-purge de notas >24h se ejecuta al abrir la app
      - Export/Import JSON funciona para backup manual de los datos del usuario
      - Lighthouse PWA audit pasa con score >= 90
      - La app funciona 100% offline sin dependencia de red para ningun feature
      name: Persistencia Local del Estado Cognitivo
      objective: Adaptar el almacenamiento del estado de la app (ciclo activo, intencion actual, notas Brain Dump) para que persistan de forma segura localmente. Si el usuario cierra la PWA o reinicia su dispositivo, la sesion y notas temporales persisten respetando la regla de auto-limpieza de 24 horas, sin depender de base de datos en la nube.
      tasks:
        PWA-T3.1:
          assignee: opencode
          description: Migrar schema store (esquemas de usuario custom) y brainDump store a IndexedDB usando el indexedDBStorage ya existente en src/utils/storage.ts. Agregar storeVersion adecuado para cada migracion. Las notas del Brain Dump y los esquemas deben sobrevivir cierre de app o reinicio de dispositivo
          status: pending
          title: Migrar stores pesados de localStorage a IndexedDB via storage.ts existente
        PWA-T3.2:
          assignee: opencode
          description: El store timer ya persiste con localStorage, pero no maneja recovery de sesion activa. Agregar logica en useTimer para calcular remainingTime desde finishTime al reabrir la app, restaurando el temporizador en curso con la intencion activa. Si remainingTime <= 0 al reabrir, contar como sesion completada/salteada segun progreso
          status: pending
          title: Implementar timer persistence con recovery de sesion activa
        PWA-T3.3:
          assignee: opencode
          description: Agregar un indicador sutil en la UI (icono de escudo/check en TimerHeader o AppToolbar) que muestre si los datos estan siendo persistidos correctamente. Si IndexedDB falla, mostrar advertencia con opcion de exportar datos como JSON backup
          status: pending
          title: Implementar indicador de persistencia de datos locales
        PWA-T3.4:
          assignee: opencode
          description: Crear feature de exportar/importar todas las stores como JSON para backup manual. Agregar en Settings > Behavior tab. Permite al usuario migrar datos entre dispositivos sin nube. Export descarga archivo .json, import lo restaura via textarea o file input
          status: pending
          title: Agregar exportacion/importacion de datos de usuario
        PWA-T3.5:
          assignee: opencode
          description: Ejecutar autoPurge() del brainDump store al inicializar la app (en App.tsx o main.tsx). Ya existe la funcion, solo necesita invocarse en startup para limpiar notas >24h que hayan expirado mientras la app estuvo cerrada
          status: pending
          title: Auto-purge al abrir la app (respect 24h Brain Dump rule)
